# FrameReview V2 — 本地开发 Docker 环境
# 生产部署: https://render.com (见 render.yaml)

services:
  # ── 应用层 ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: framereview-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - PHP_MEMORY_LIMIT=256M
      - PHP_UPLOAD_MAX_FILESIZE=10G
      - PHP_POST_MAX_SIZE=10G
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - framereview

  # ── Web 服务器 ──────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: framereview-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
      - ./docker/nginx/default.conf:/etc/nginx/http.d/default.conf
    depends_on:
      - app
    networks:
      - framereview

  # ── 数据库 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: framereview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: framereview
      POSTGRES_USER: framereview
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - framereview

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: framereview-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - framereview

  # ── MinIO（本地对象存储）───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: framereview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: framereview
      MINIO_ROOT_PASSWORD: changeme
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - framereview

  # ── 媒体处理 Worker（可选）──────────────────────────────
  media-worker:
    build:
      context: ./media-worker
      dockerfile: Dockerfile
    container_name: framereview-media-worker
    restart: unless-stopped
    volumes:
      - ./media-worker:/var/www
      - media-files:/var/opt/media
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://framereview:changeme@postgres:5432/framereview
      - MEDIA_ROOT=/var/opt/media
    depends_on:
      - redis
      - postgres
    networks:
      - framereview
    command: ["node", "src/index.js"]

  # ── 全文搜索引擎（可选）────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: framereview-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: changeme_search_key
      MEILI_ENV: development
    volumes:
      - meilisearch-data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - framereview

  # ── 队列监控 ────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: framereview-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - framereview

networks:
  framereview:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  meilisearch-data:
  media-files:
