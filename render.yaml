services:
  - type: web
    name: framereview-web
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install --production=false && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: framereview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: framereview-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        value: https://s3.amazonaws.com
      - key: S3_BUCKET
        value: framereview-media
      - key: S3_REGION
        value: us-east-1

  - type: worker
    name: framereview-worker
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install --production=false && npx prisma generate
    startCommand: node media-worker/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: framereview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: framereview-redis
          property: connectionString

  - type: redis
    name: framereview-redis
    region: singapore
    plan: starter
    ipAllowList: []

databases:
  - name: framereview-db
    databaseName: framereview
    plan: starter
