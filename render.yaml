databaseOrientation: vertical
services:
  - name: framereview-web
    env: node
    region: singapore
    plan: starter
    yarn: false
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: framereview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: framereview-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        value: https://s3.amazonaws.com
      - key: S3_BUCKET
        value: framereview-media
      - key: S3_REGION
        value: us-east-1

  - name: framereview-worker
    env: node
    region: singapore
    plan: starter
    yarn: false
    buildCommand: cd media-worker && npm install && npx prisma generate
    startCommand: cd media-worker && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: framereview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: framereview-redis
          property: connectionString

  - name: framereview-redis
    env: redis
    region: singapore
    plan: starter

databases:
  - name: framereview-db
    databaseName: framereview
    plan: starter
